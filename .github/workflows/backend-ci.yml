name: Backend CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  ruff-lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Install ruff
      run: pip install ruff
    - name: Run ruff check
      run: ruff check .

  pyrefly-typecheck:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Install pyrefly
      run: pip install pyrefly
    - name: Run pyrefly
      run: pyrefly check .

  backend-tests:
    runs-on: ubuntu-latest

    # Spin up real Postgres and Redis so pytest can connect to them
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: 1234
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Set up environment
      run: |
        cp .env.example .env
        # Override values that must be set for tests to start without crashing
        sed -i 's|POSTGRES_CONNECTION_URL=.*|POSTGRES_CONNECTION_URL=postgresql://postgres:1234@localhost:5432/postgres|' .env
        sed -i 's|REDIS_URL=.*|REDIS_URL=redis://localhost:6379/0|' .env
        sed -i 's|GEMINI_API_KEY=.*|GEMINI_API_KEY=test-placeholder|' .env
        sed -i 's|LLM_MODEL=.*|LLM_MODEL=gemini-2.5-flash|' .env
        sed -i 's|GITHUB_PRIVATE_KEY_PATH=.*|GITHUB_PRIVATE_KEY_PATH=/tmp/key.pem|' .env
        # Create a dummy private key file to prevent file-not-found crashes
        openssl genrsa -out /tmp/key.pem 2048

    - name: Run tests
      run: python -m pytest
