services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
  
  redis:
    image: redis:7-alpine

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 80
    ports:
      - "80:80"
    depends_on:
      - postgres
      - redis
    env_file:
      - .env
    volumes:
      - repo_data:/app/repos

  worker:
    build: .
    command: python workers.py
    depends_on:
      - postgres
      - redis
    env_file:
      - .env
    volumes:
      - repo_data:/app/repos

volumes:
  postgres_data:
  repo_data:
