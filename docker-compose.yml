services:
  postgres:
    image: postgres:15
    container_name: dd-backend-postgres-1
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: dd-backend-redis-1
    restart: always
    ports:
      - "6379:6379"

  drizzle-gateway:
    image: ghcr.io/drizzle-team/gateway:latest
    container_name: delta-drizzle-gateway
    environment:
      DATABASE_URL: postgresql://postgres:1234@postgres:5432/postgres
      STORE_PATH: /app
    restart: always
    depends_on:
      - postgres
    ports:
      - "4983:4983"
    volumes:
      - drizzle_gateway_data:/app

  api:
    build: .
    container_name: dd-backend-api-1
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    env_file:
      - .env

  worker:
    build: .
    container_name: dd-backend-worker-1
    restart: always
    command: python workers.py
    depends_on:
      - redis
      - postgres
    env_file:
      - .env

volumes:
  postgres_data:
  redis_data:
  drizzle_gateway_data: